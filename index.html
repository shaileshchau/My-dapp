<!DOCTYPE html>
<html>
<head>
  <title>Trust Wallet Connect</title>
</head>

<body>

<h2>Connect Trust Wallet</h2>

<button onclick="connectWallet()">Connect Wallet</button>
<p id="wallet">Not Connected</p>

<script src="https://unpkg.com/@walletconnect/ethereum-provider@2.10.1/dist/index.umd.js"></script>

<script>

let provider;

async function connectWallet() {
  try {

    provider = await window.EthereumProvider.init({
      projectId: "demo", // demo ચાલે basic test માટે
      chains: [1],
      showQrModal: true
    });

    await provider.enable();

    const accounts = provider.accounts;

    document.getElementById("wallet").innerText =
      "Connected: " + accounts[0];

  } catch (err) {
    console.log(err);
    alert("Connection failed");
  }
}

</script>

</body>
</html>
