<!DOCTYPE html>
<html>
<head>
  <title>Multi Wallet dApp</title>
</head>

<body>

<h2>🚀 Connect Wallet</h2>

<button onclick="connectMetaMask()">Connect MetaMask</button>
<button onclick="connectTrust()">Connect Trust Wallet</button>

<p id="wallet">Not Connected</p>

<!-- WalletConnect -->
<script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>

<script>

let web3;
let userAccount;

// 🔗 MetaMask connect
async function connectMetaMask() {
  if (!window.ethereum) {
    alert("MetaMask not found");
    return;
  }

  const accounts = await window.ethereum.request({
    method: "eth_requestAccounts"
  });

  userAccount = accounts[0];
  document.getElementById("wallet").innerText = "MetaMask: " + userAccount;

  web3 = new Web3(window.ethereum);
}

// 🔗 Trust Wallet connect (WalletConnect)
async function connectTrust() {

  const provider = new WalletConnectProvider.default({
    rpc: {
      1: "https://mainnet.infura.io/v3/"
    }
  });

  await provider.enable();

  web3 = new Web3(provider);

  const accounts = await web3.eth.getAccounts();
  userAccount = accounts[0];

  document.getElementById("wallet").innerText = "Trust Wallet: " + userAccount;
}

</script>

</body>
</html>
