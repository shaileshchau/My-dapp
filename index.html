<!DOCTYPE html>
<html>
<head>
  <title>Multi Wallet dApp</title>
  <style>
    body {
      text-align: center;
      background: #111;
      color: #fff;
      font-family: Arial;
    }
    button {
      padding: 10px 18px;
      margin: 8px;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>🚀 Multi Wallet dApp</h2>

<button onclick="connectMetaMask()">Connect MetaMask</button>
<button onclick="connectTrust()">Connect Trust Wallet</button>

<p id="wallet">Not Connected</p>

<button onclick="getBalance()">Check Balance</button>
<button onclick="sendETH()">Send 0.001 ETH</button>

<!-- WalletConnect v2 -->
<script src="https://unpkg.com/@walletconnect/ethereum-provider@2.10.1/dist/index.umd.js"></script>

<script>

let provider;
let userAccount;

// 🔗 MetaMask connect
async function connectMetaMask() {
  if (!window.ethereum) {
    alert("MetaMask not found");
    return;
  }

  const accounts = await window.ethereum.request({
    method: "eth_requestAccounts"
  });

  provider = window.ethereum;
  userAccount = accounts[0];

  document.getElementById("wallet").innerText =
    "MetaMask: " + userAccount;
}

// 🔗 Trust Wallet connect (WalletConnect v2)
async function connectTrust() {
  try {
    provider = await window.EthereumProvider.init({
      projectId: "demo",   // demo માટે (real project માટે projectId લેવો)
      chains: [1],
      optionalChains: [56],
      showQrModal: true
    });

    await provider.connect();

    const accounts = await provider.request({
      method: "eth_accounts"
    });

    userAccount = accounts[0];

    document.getElementById("wallet").innerText =
      "Trust Wallet: " + userAccount;

  } catch (err) {
    console.log(err);
    alert("Trust Wallet connection failed");
  }
}

// 💰 Balance
async function getBalance() {
  if (!provider || !userAccount) {
    alert("Connect wallet first");
    return;
  }

  const balance = await provider.request({
    method: "eth_getBalance",
    params: [userAccount, "latest"]
  });

  const eth = parseInt(balance, 16) / 1e18;
  alert("Balance: " + eth + " ETH");
}

// 💸 Send ETH
async function sendETH() {
  if (!provider || !userAccount) {
    alert("Connect wallet first");
    return;
  }

  try {
    await provider.request({
      method: "eth_sendTransaction",
      params: [{
        from: userAccount,
        to: "YOUR_WALLET_ADDRESS", // 👈 તમારું address નાખો
        value: "0x38D7EA4C68000"
      }]
    });

    alert("Transaction Sent");

  } catch (err) {
    console.log(err);
    alert("Transaction Failed");
  }
}

</script>

</body>
</html>
